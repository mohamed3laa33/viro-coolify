# In-cluster Postgres for the Vortex control plane (self-contained clusters / dev).
# For production, prefer DigitalOcean Managed Postgres (deploy/terraform) and point
# the control plane at it via secrets.databaseUrl — then skip this file.
# Uses the official postgres image (no deprecated Bitnami dependency).
#   kubectl apply -f deploy/k8s/postgres.yaml
---
apiVersion: v1
kind: Namespace
metadata:
  name: vortex
---
apiVersion: v1
kind: Secret
metadata:
  name: vortex-postgres
  namespace: vortex
type: Opaque
stringData:
  POSTGRES_USER: vortex
  POSTGRES_PASSWORD: "change-me-in-production"
  POSTGRES_DB: vortex
---
apiVersion: v1
kind: Service
metadata:
  name: vortex-postgres
  namespace: vortex
  labels: { app: vortex-postgres }
spec:
  selector: { app: vortex-postgres }
  ports:
    - port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: vortex-postgres
  namespace: vortex
spec:
  serviceName: vortex-postgres
  replicas: 1
  selector:
    matchLabels: { app: vortex-postgres }
  template:
    metadata:
      labels: { app: vortex-postgres }
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          envFrom:
            - secretRef:
                name: vortex-postgres
          env:
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          readinessProbe:
            exec: { command: ["pg_isready", "-U", "vortex"] }
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            exec: { command: ["pg_isready", "-U", "vortex"] }
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests: { cpu: 100m, memory: 256Mi }
            limits: { cpu: "1", memory: 1Gi }
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi
