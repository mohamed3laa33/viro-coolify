# Vortex shared edge: ONE Gateway = ONE LoadBalancer for the whole platform.
# Every tenant app gets its own HTTPRoute (in its org-project namespace) that
# attaches to THIS Gateway via parentRefs — so adding apps never adds LBs.
#
# Replaces the retired ingress-nginx with the Gateway API + Envoy Gateway.
# Edit the domain + DigitalOcean token secret, then: kubectl apply -f deploy/k8s/gateway.yaml
---
# CANONICAL NAMESPACE = "vortex" — the same namespace the helmfile / vortex-bootstrap
# chart install the shared Gateway, Postgres and control plane into. This standalone
# manifest is the manual alternative to the bootstrap chart; keep its namespace in
# sync so the control-plane HTTPRoute's gatewayNamespace (also "vortex") resolves.
apiVersion: v1
kind: Namespace
metadata:
  name: vortex
---
# GatewayClass backed by Envoy Gateway (installed by 01-provision-doks.sh).
apiVersion: gateway.networking.k8s.io/v1
kind: GatewayClass
metadata:
  name: vortex
spec:
  controllerName: gateway.envoyproxy.io/gatewayclass-controller
---
# cert-manager DNS-01 issuer using DigitalOcean DNS (required for WILDCARD certs).
# Create the token secret first:
#   kubectl -n vortex create secret generic do-dns \
#     --from-literal=access-token=dop_v1_xxxxxxxx
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: vortex-letsencrypt
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: admin@v60ai.com
    privateKeySecretRef:
      name: vortex-letsencrypt-account
    solvers:
      - dns01:
          digitalocean:
            tokenSecretRef:
              name: do-dns
              key: access-token
---
# Wildcard certificate for every tenant subdomain: *.<...>.vortex.v60ai.com.
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: vortex-wildcard
  namespace: vortex
spec:
  secretName: vortex-wildcard-tls
  issuerRef:
    name: vortex-letsencrypt
    kind: ClusterIssuer
  dnsNames:
    - "vortex.v60ai.com"
    - "*.vortex.v60ai.com"
    # Tenant apps are <app>.<project>.<org>.vortex.v60ai.com — that is a 4th-level
    # label, so a single wildcard is not enough. Either issue a wildcard per active
    # org (*.<org>.vortex.v60ai.com) on org creation, or use a wildcard CNAME +
    # per-host certs. The control plane manages these certs as orgs are created.
---
# The PRIMARY shared Gateway (shard 0). allowedRoutes: All lets per-tenant-namespace
# HTTPRoutes attach, so one LB fronts every app.
#
# Custom-domain HTTPS listeners auto-shard PAST this Gateway's 64-listener ceiling:
# the control plane creates "vortex-shard-<n>" Gateways on demand (see
# apps/api/internal/kube + deploy/KUBERNETES.md). This minimal manual manifest only
# declares the primary; for the merged-single-LB shard pool (Envoy Gateway
# mergeGateways) and any pre-provisioned shards, use the automated
# charts/vortex-bootstrap path (the canonical, no-manual-kubectl install).
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: vortex
  # CANONICAL NAMESPACE = "vortex" (matches the helmfile / vortex-bootstrap chart
  # and the Namespace declared at the top of this manifest). The shard-primary
  # labels come from the sharding work so the control plane can discover this
  # Gateway as shard 0 of the auto-sharding pool.
  namespace: vortex
  labels:
    app.kubernetes.io/managed-by: vortex
    vortex.v60ai.com/gateway-shard-primary: "true"
spec:
  gatewayClassName: vortex
  listeners:
    - name: https
      protocol: HTTPS
      port: 443
      hostname: "*.vortex.v60ai.com"
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: vortex-wildcard-tls
      allowedRoutes:
        namespaces:
          from: All
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: All
