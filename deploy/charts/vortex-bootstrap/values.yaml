baseDomain: vortex.v60ai.com
acmeEmail: admin@v60ai.com

postgres:
  enabled: true
  image: postgres:16-alpine
  # No insecure default — a strong password MUST be supplied (the helmfile passes
  # the required VORTEX_PG_PASSWORD here). Rendering fails if left empty.
  password: ""
  storage: 10Gi

gateway:
  name: vortex
  className: vortex
  controllerName: gateway.envoyproxy.io/gatewayclass-controller
  # Custom-domain listener SHARDING (scale past one Gateway's 64-listener ceiling).
  # The control plane auto-creates "<name>-shard-<n>" Gateways as the primary fills
  # up; these knobs tune how the shard pool is provisioned and whether shards share
  # the primary LoadBalancer. See templates/gateway.yaml and deploy/KUBERNETES.md.
  shards:
    # count pre-provisions a STATIC pool of this many empty shard Gateways at
    # bootstrap. 0 (default) means the backend creates shards dynamically, only
    # when the primary fills up — the cheapest default. Set >0 only if you want
    # shards declared up front.
    count: 0
  # merge enables Envoy-Gateway "mergeGateways" so the primary + every shard share
  # ONE Envoy fleet / ONE LoadBalancer (preserves the single-LB cost model past 64
  # listeners). Requires envoyProxy: true and the Envoy Gateway controller. When
  # false, each shard provisions its own LoadBalancer (honest extra cost only at
  # very large custom-domain counts).
  merge: true
  # envoyProxy renders the EnvoyProxy CR that mergeGateways needs. Set false if your
  # Gateway controller is NOT Envoy Gateway (then leave merge handling to that
  # controller's own mechanism, or accept per-shard LoadBalancers).
  envoyProxy: true

tls:
  enabled: true
  # DigitalOcean API token for cert-manager DNS-01 wildcard issuance.
  digitalOceanToken: ""
