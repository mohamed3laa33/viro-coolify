{{- if .Values.tls.enabled }}
# cert-manager resolves a ClusterIssuer's DNS-01 token from its own namespace
# (cluster-resource-namespace, default "cert-manager").
apiVersion: v1
kind: Secret
metadata:
  name: do-dns
  namespace: cert-manager
type: Opaque
stringData:
  access-token: {{ .Values.tls.digitalOceanToken | quote }}
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: vortex-letsencrypt
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: {{ .Values.acmeEmail }}
    privateKeySecretRef:
      name: vortex-letsencrypt-account
    solvers:
      - dns01:
          digitalocean:
            tokenSecretRef:
              name: do-dns
              key: access-token
---
# Platform wildcard. "*.<baseDomain>" matches exactly ONE label, so it covers the
# apex services (api., app.) and the org-apex host <org>.<baseDomain> — but NOT the
# deeper tenant hosts. A tenant app is <app>.<project>.<org>.<baseDomain> (THREE
# labels below the apex), so it is covered only by a wildcard at the PROJECT label,
# "*.<project>.<org>.<baseDomain>". The control plane issues those per-org
# certificates on org creation (kube.Backend EnsureOrgWildcard): one Certificate
# per org covering "*.<org>.<baseDomain>" (project-level hosts) plus
# "*.<project>.<org>.<baseDomain>" (app-level hosts) for each known project, with a
# matching shared-Gateway HTTPS listener. Operators may pre-seed known orgs below
# via tls.extraOrgWildcards; the control plane otherwise creates them dynamically.
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: vortex-wildcard
  namespace: {{ .Release.Namespace }}
spec:
  secretName: vortex-wildcard-tls
  issuerRef:
    name: vortex-letsencrypt
    kind: ClusterIssuer
  dnsNames:
    - "{{ .Values.baseDomain }}"
    - "*.{{ .Values.baseDomain }}"
{{- range .Values.tls.extraOrgWildcards }}
---
# Optional statically-pinned per-org wildcard certificate. dnsNames should cover
# "*.<org>.<baseDomain>" AND each "*.<project>.<org>.<baseDomain>" so the 3-label
# tenant app host terminates TLS.
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ .name }}
  namespace: {{ $.Release.Namespace }}
spec:
  secretName: {{ .secretName }}
  issuerRef:
    name: vortex-letsencrypt
    kind: ClusterIssuer
  dnsNames:
    {{- range .dnsNames }}
    - {{ . | quote }}
    {{- end }}
{{- end }}
{{- end }}
