# Single shared Gateway = one LoadBalancer for the whole platform. Tenant app
# HTTPRoutes (in their org-project namespaces) attach here via parentRefs.
apiVersion: gateway.networking.k8s.io/v1
kind: GatewayClass
metadata:
  name: {{ .Values.gateway.className }}
spec:
  controllerName: {{ .Values.gateway.controllerName }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: {{ .Values.gateway.name }}
  namespace: {{ .Release.Namespace }}
spec:
  gatewayClassName: {{ .Values.gateway.className }}
  listeners:
    - name: https
      protocol: HTTPS
      port: 443
      hostname: "*.{{ .Values.baseDomain }}"
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: vortex-wildcard-tls
      allowedRoutes:
        namespaces:
          from: All
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: All
