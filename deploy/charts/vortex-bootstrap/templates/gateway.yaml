# Gateway API routing for the whole platform.
#
# COST MODEL: the primary Gateway = one LoadBalancer for everything. Tenant app
# HTTPRoutes (in their org-project namespaces) attach here via parentRefs and ride
# the wildcard "*.<baseDomain>" listener — they need NO per-tenant listener.
#
# CUSTOM-DOMAIN SHARDING: a VERIFIED custom domain needs its own HTTPS listener
# (for SNI/TLS termination). A single Gateway has a hard ceiling of 64 listeners.
# The control plane (apps/api/internal/kube) AUTO-SHARDS custom-domain listeners
# across a POOL of Gateways: once the primary fills up, listeners overflow to
# Gateways named "<gateway.name>-shard-<n>" that the backend creates on demand.
# This template can ALSO pre-provision a STATIC pool (gateway.shards.count > 0) for
# operators who prefer declarative shards over dynamic creation; the backend reuses
# any shard with spare capacity before creating a new one, so the two approaches
# compose.
#
# SINGLE-LB PRESERVATION: by default each Gateway maps to its own LoadBalancer
# Service, so overflow shards would each cost an extra LB. To KEEP the single-LB
# model past 64 listeners, enable gateway.merge (Envoy Gateway only): it installs
# an EnvoyProxy with mergeGateways=true referenced by the GatewayClass, so every
# Gateway of this class is merged onto ONE Envoy fleet behind ONE Service/LB. The
# backend clones the primary's spec.infrastructure onto each shard so the merge
# applies to dynamically-created shards too. See deploy/KUBERNETES.md for the
# tradeoffs (merged: cheapest, shares one data plane / blast radius; unmerged: a
# few extra LBs only at very large custom-domain counts, with isolation per shard).
{{- if and .Values.gateway.merge .Values.gateway.envoyProxy }}
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: EnvoyProxy
metadata:
  name: {{ .Values.gateway.name }}-proxy
  namespace: {{ .Release.Namespace }}
spec:
  # mergeGateways collapses every Gateway of this GatewayClass onto a SINGLE Envoy
  # deployment + Service (one LoadBalancer), so custom-domain listener shards do
  # not each provision their own LB — the single-LB cost model holds past 64
  # listeners. Listener names are unique across shards (the backend derives them
  # from a hash of the host), which mergeGateways requires.
  mergeGateways: true
---
{{- end }}
apiVersion: gateway.networking.k8s.io/v1
kind: GatewayClass
metadata:
  name: {{ .Values.gateway.className }}
spec:
  controllerName: {{ .Values.gateway.controllerName }}
  {{- if and .Values.gateway.merge .Values.gateway.envoyProxy }}
  # Point the class at the merged-data-plane EnvoyProxy so all Gateways of this
  # class (primary + every shard) share one Envoy fleet / one LoadBalancer.
  parametersRef:
    group: gateway.envoyproxy.io
    kind: EnvoyProxy
    name: {{ .Values.gateway.name }}-proxy
    namespace: {{ .Release.Namespace }}
  {{- end }}
---
# The shared Gateway carries the BASE listeners (the platform wildcard + plain
# HTTP) below. PER-ORG HTTPS listeners — one per org wildcard "*.<org>.<base>"
# and per known project wildcard "*.<project>.<org>.<base>" — are NOT rendered
# here: the control plane adds them imperatively at org creation (kube.Backend
# EnsureOrgWildcard) by merging into spec.listeners. This is required because the
# tenant host <app>.<project>.<org>.<base> is THREE labels deep, and a DNS/TLS
# wildcard matches exactly ONE label, so the base "*.<base>" listener below
# covers neither the project-level nor the app-level host.
#
# IMPORTANT: do NOT `helm upgrade` this chart with a server-side-apply / replace
# strategy that prunes spec.listeners — that would wipe the control-plane-managed
# per-org listeners. A standard `helm upgrade` 3-way merge preserves array
# additions the chart does not declare; the control plane also re-runs
# EnsureOrgWildcard idempotently on the next app deploy, so a clobber self-heals.
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: {{ .Values.gateway.name }}
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/managed-by: vortex
    vortex.v60ai.com/gateway-shard-primary: "true"
spec:
  gatewayClassName: {{ .Values.gateway.className }}
  listeners:
    # Platform wildcard: api., app. and <org>.<base> (one label below the apex).
    - name: https
      protocol: HTTPS
      port: 443
      hostname: "*.{{ .Values.baseDomain }}"
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: vortex-wildcard-tls
      allowedRoutes:
        namespaces:
          from: All
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: All
{{- range .Values.gateway.extraOrgWildcards }}
    # Optional statically-pinned per-org wildcard listeners (covering
    # "*.<org>.<base>" and "*.<project>.<org>.<base>"). The control plane normally
    # manages these imperatively; this list lets an operator pre-seed known orgs.
    - name: {{ .name }}
      protocol: HTTPS
      port: 443
      hostname: {{ .hostname | quote }}
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: {{ .certSecret }}
      allowedRoutes:
        namespaces:
          from: All
{{- end }}
{{- /*
  Optional STATIC custom-domain shard pool. Each shard is an additional Gateway of
  the same class named "<gateway.name>-shard-<n>" that starts with NO listeners
  (the wildcard/http listeners live only on the primary); the control plane fills
  them with per-domain HTTPS listeners as custom domains are verified. Set
  gateway.shards.count > 0 to pre-provision; leave it 0 to let the backend create
  shards dynamically only when the primary fills up.
*/}}
{{- $count := int .Values.gateway.shards.count }}
{{- range $i := until $count }}
{{- $idx := add $i 1 }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: {{ $.Values.gateway.name }}-shard-{{ $idx }}
  namespace: {{ $.Release.Namespace }}
  labels:
    app.kubernetes.io/managed-by: vortex
    vortex.v60ai.com/gateway-shard: "true"
spec:
  gatewayClassName: {{ $.Values.gateway.className }}
  # Custom-domain listeners are merged in by the control plane; a shard starts
  # empty. (A zero-listener Gateway is valid — it simply serves nothing until the
  # first custom-domain listener is attached.)
  listeners: []
{{- end }}
