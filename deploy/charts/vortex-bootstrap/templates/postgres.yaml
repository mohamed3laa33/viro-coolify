{{- if .Values.postgres.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: vortex-postgres
  namespace: {{ .Release.Namespace }}
type: Opaque
stringData:
  POSTGRES_USER: vortex
  POSTGRES_PASSWORD: {{ required "postgres.password is required — supply a strong value (e.g. via VORTEX_PG_PASSWORD)" .Values.postgres.password | quote }}
  POSTGRES_DB: vortex
---
apiVersion: v1
kind: Service
metadata:
  name: vortex-postgres
  namespace: {{ .Release.Namespace }}
  labels: { app: vortex-postgres }
spec:
  selector: { app: vortex-postgres }
  ports:
    - port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: vortex-postgres
  namespace: {{ .Release.Namespace }}
spec:
  serviceName: vortex-postgres
  replicas: 1
  selector:
    matchLabels: { app: vortex-postgres }
  template:
    metadata:
      labels: { app: vortex-postgres }
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 70
        runAsGroup: 70
        fsGroup: 70
      containers:
        - name: postgres
          image: {{ .Values.postgres.image | quote }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          ports:
            - containerPort: 5432
          envFrom:
            - secretRef: { name: vortex-postgres }
          env:
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          readinessProbe:
            exec: { command: ["pg_isready", "-U", "vortex"] }
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            exec: { command: ["pg_isready", "-U", "vortex"] }
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests: { cpu: 100m, memory: 256Mi }
            limits: { cpu: "1", memory: 1Gi }
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata: { name: data }
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: {{ .Values.postgres.storage }}
{{- end }}
