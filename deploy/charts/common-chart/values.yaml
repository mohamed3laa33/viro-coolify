# -- Provide a name in place of node for `app:` labels
nameOverride: ""

# -- Provide a name to substitute for the full names of resources
fullnameOverride: ""

# -- Provide a name to substitute for the full names of resources
namespaceOverride: ""

# -- Additional common labels on resources
extraLabels: {}

##########################################################
# Deployment- deployment.yaml
##########################################################
deployment:
  enabled: true
  stateful: false

  # -- Image to use for the chart
  image:
    # -- Image repository
    repository: nginx
    # -- Image pull policy
    pullPolicy: IfNotPresent
    # -- Image tag
    tag: "latest"

  # -- Enable Pod Topology Spread Constraints to distribute pods evenly across the nodes
  topologySpreadConstraints:
    enabled: true

  # -- Override default container args
  args: []

  # -- Override default container command
  command: []

  # -- Deployment strategy specification
  strategySpec:
    type: RollingUpdate

  # -- Number of replicas for the pod
  replicaCount: 1

  # -- Reference to one or more secrets to be used when pulling images
  # ref: https://kubernetes.io/docs/tasks/configure-pod-container/pull-image-private-registry/
  imagePullSecrets: []

  # -- Define init container
  # ref: https://kubernetes.io/docs/concepts/workloads/pods/init-containers/
  # initContainers:
  #   - name: init-container
  #     image: busybox:1.28
  #     command: ['sh', '-c', "sleep 30"]
  #     volumeMounts:
  #       - name: name
  #         mountPath: "/path"

  annotations: {}

  # -- Annotations to add to the pod
  podAnnotations: {}

  # -- SecurityContext holds pod-level security attributes and common container settings.
  # This defaults to non root user with uid 1000 and gid 1000.
  # ref: https://kubernetes.io/docs/tasks/configure-pod-container/security-context/
  podSecurityContext: {}
    # fsGroup: 1000
    # runAsNonRoot: true
    # runAsUser: 1000
    # runAsGroup: 1000
  # -- SecurityContext settings for the main container
  containerSecurityContext: {}
    # capabilities:
    #   drop:
    #   - ALL
    # readOnlyRootFilesystem: true
    # runAsNonRoot: true
    # runAsUser: 1000
    # runAsGroup: 1000

  # -- Environment variable to add to the pods
  env: {}
    # VAR: "value"
    # VAR2:
    #   valueFrom:
    #     secretKeyRef:
    #       key: my-key
    #       name: env-secret

  # -- Environment variables from secrets or configmaps to add to the pods
  envFrom: []
  #  - configMapRef:
  #      name: env-configmap
  #  - secretRef:
  #      name: env-secret


  # -- Additional Pod Spec
  additionalPodSpec: {}

  # -- Resource limits & requests
  resources: {}
    # limits:
    #   cpu: 100m
    #   memory: 128Mi
    # requests:
    #   cpu: 100m
    #   memory: 128Mi

  # -- Define which Nodes the Pods are scheduled on.
  nodeSelector: {}

  # -- Tolerations for use with node taints
  tolerations: []

  # -- Assign custom affinity rules
  affinity: {}

  # -- Controller Container liveness probe configuration
  # ref: https://kubernetes.io/docs/tasks/configure-pod-container/configure-liveness-readiness-startup-probes/
  livenessProbe: {}
    # failureThreshold: 3
    # successThreshold: 1
    # initialDelaySeconds: 0
    # timeoutSeconds: 1
    # tcpSocket:
    #   port: 80
    # periodSeconds: 10

  # -- Controller Container readiness probe configuration
  readinessProbe: {}
    # failureThreshold: 3
    # successThreshold: 1
    # initialDelaySeconds: 0
    # timeoutSeconds: 1
    # tcpSocket:
    #   port: 80
    # periodSeconds: 10

  # -- Controller Container startup probe configuration
  startupProbe: {}
    # failureThreshold: 3
    # successThreshold: 1
    # initialDelaySeconds: 0
    # timeoutSeconds: 1
    # tcpSocket:
    #   port: 80
    # periodSeconds: 10

  additionalPodAnnotations: {}
  # -- Annotations to add to the pod

##########################################################
# ConfigMap- configmap.yaml
##########################################################
config: {}

##########################################################
# Service- service.yaml
##########################################################
service:
  enabled: true
  # -- Annotations to add to the Service resource
  annotations: {}
  # -- Service type
  type: ClusterIP
  # -- Session Affinitiy type
  sessionAffinity: ""
  # -- Ports to expose on the service
  ports:
    # - name: http
    #   port: 80
    #   targetPort: 8080
    #   protocol: TCP
    # - name: rpc
    #   port: 9090
    #   targetPort: 9090
    #   protocol: TCP

##########################################################
# Extra Services - extra-services.yaml
##########################################################
# -- List of additional Service resources to create alongside the primary service.
# Each entry creates a separate Service. Leave empty to skip.
# Supported keys per entry:
#   name (required), type, ports (required), selector, annotations, sessionAffinity
# When selector is omitted, the chart's default selectorLabels are used.
# NOTE: when adopting a pre-existing in-cluster Service that already carries a
# different selector (e.g. a Service originally created by Kustomize/Skaffold),
# always supply `selector` explicitly. Omitting it lets the chart overwrite
# spec.selector via ServerSideApply, which can momentarily stop routing to
# legacy pods until new pods carrying chart labels are Ready.
extraServices: []
  # - name: my-app-nodeport
  #   type: NodePort
  #   annotations: {}
  #   ports:
  #     - name: http
  #       port: 80
  #       targetPort: 8080
  #       nodePort: 30080
  #       protocol: TCP
  # - name: my-app-apidocs-iap
  #   type: NodePort
  #   annotations:
  #     cloud.google.com/backend-config: '{"default":"my-app-iap-backendconfig"}'
  #   ports:
  #     - name: http
  #       port: 80
  #       targetPort: 8080
  #       protocol: TCP
  # - name: my-app-internal-lb
  #   type: LoadBalancer
  #   annotations:
  #     networking.gke.io/load-balancer-type: "Internal"
  #   ports:
  #     - name: http
  #       port: 80
  #       targetPort: 8080
  #       protocol: TCP

##########################################################
# Additional BackendConfigs
##########################################################
# -- List of additional GKE BackendConfig resources, beyond the single
# `backendConfig` above. Each entry maps to one BackendConfig. Pair an entry
# with an `extraServices` Service (via its `cloud.google.com/backend-config`
# annotation) to give a subset of Ingress paths a different policy — e.g. an
# IAP-exempt backend for webhook paths while the default stays behind IAP.
# Each entry supports the same keys as `backendConfig`: name (required),
# annotations, additionalLabels, timeoutSec, connectionDraining,
# sessionAffinity, cdn, securityPolicy, logging, healthCheck, iap,
# customRequestHeaders, customResponseHeaders.
extraBackendConfigs: []
  # - name: my-app-public
  #   # IAP omitted entirely => unauthenticated backend
  #   healthCheck:
  #     requestPath: /healthz
  #     type: HTTP
  #   # Optional Cloud Armor policy for defense-in-depth on the public backend
  #   securityPolicy:
  #     name: my-rate-limit-policy

##########################################################
# Role Based Access Control (RBAC)- serviceaccount.yaml
##########################################################
# Service Account to use by pods
serviceAccount:
  enabled: false
  name: ""

  # Additional Labels on service account
  additionalLabels:
    # key: value

    # Annotations on service account
  annotations:
    # key: value

# Role Based Access Control (RBAC)
rbac:
  # -- Enable creation of Role and RoleBinding
  enabled: false

  # -- Name of the Role (defaults to chart name if not set)
  roleName: ""

  # -- Name of the RoleBinding (defaults to chart name if not set)
  roleBindingName: ""

  # -- RBAC rules for the Role
  rules: []
    # - apiGroups: [""]
    #   resources: ["pods"]
    #   verbs: ["get", "list", "watch"]

  # -- Additional labels for RBAC resources
  additionalLabels: {}

  # -- Annotations for RBAC resources
  annotations: {}

# Cluster Role Based Access Control (ClusterRole)
clusterRole:
  # -- Enable creation of ClusterRole
  enabled: false

  # -- Name of the ClusterRole (defaults to chart name if not set)
  name: ""

  # -- RBAC rules for the ClusterRole
  rules: []
    # - apiGroups: ["batch"]
    #   resources: ["jobs"]
    #   verbs: ["get", "list", "watch"]

  # -- Additional labels for ClusterRole
  additionalLabels: {}

  # -- Annotations for ClusterRole
  annotations: {}

# Cluster Role Binding
clusterRoleBinding:
  # -- Enable creation of ClusterRoleBinding
  enabled: false

  # -- Name of the ClusterRoleBinding (defaults to chart name if not set)
  name: ""

  # -- Name of the ClusterRole to bind to
  clusterRoleName: ""

  # -- Additional labels for ClusterRoleBinding
  additionalLabels: {}

  # -- Annotations for ClusterRoleBinding
  annotations: {}


##########################################################
# Ingress- ingress.yaml
##########################################################
ingress:
  # -- Enable creation of Ingress
  enabled: false
  # -- Ingress class name
  className: ""
