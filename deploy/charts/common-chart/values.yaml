##########################################################
# Gateway API - httproute.yaml
##########################################################
# Gateway API HTTPRoute for GKE
# ref: https://cloud.google.com/kubernetes-engine/docs/concepts/gateway-api
# ref: https://gateway-api.sigs.k8s.io/
gateway:
  # -- Enable creation of HTTPRoute
  enabled: false
  # -- Annotations to add to the HTTPRoute
  annotations: {}
  # -- Additional labels for HTTPRoute
  additionalLabels: {}
  # -- Parent Gateway references
  # For GKE, the Gateway should be created separately (cluster-wide or per-namespace)
  # Common GKE Gateway classes:
  #   - gke-l7-global-external-managed (Global external Application Load Balancer)
  #   - gke-l7-regional-external-managed (Regional external Application Load Balancer)
  #   - gke-l7-rilb (Regional internal Application Load Balancer)
  #   - gke-l7-gxlb (Classic Global external Application Load Balancer)
  parentRefs: []
  #  - name: my-gateway
  #    namespace: default
  #    sectionName: https  # optional: specific listener on the gateway
  # -- Hostnames to match for this route
  hostnames: []
  #  - "example.com"
  #  - "*.example.com"
  # -- Backend service port (used in default rule if rules not specified)
  backendPort: 80
  # -- HTTPRoute rules (if not specified, a default rule routing to the service is created)
  # ref: https://gateway-api.sigs.k8s.io/reference/spec/#gateway.networking.k8s.io/v1.HTTPRouteRule
  rules: []
  #  - matches:
  #      - path:
  #          type: PathPrefix
  #          value: /api
  #      - headers:
  #          - name: version
  #            value: v2
  #    backendRefs:
  #      - name: my-service
  #        port: 80
  #        weight: 100
  #    filters:
  #      - type: RequestHeaderModifier
  #        requestHeaderModifier:
  #          add:
  #            - name: X-Custom-Header
  #              value: custom-value

