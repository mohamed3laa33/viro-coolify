##########################################################
# PodDisruptionBudget- pdb.yaml
##########################################################
# -- See `kubectl explain poddisruptionbudget.spec` for more
# ref: https://kubernetes.io/docs/tasks/run-application/configure-pdb/
podDisruptionBudget: {}
  # minAvailable: 1
  # maxUnavailable: 1

##########################################################
# HPA- hpa.yaml
##########################################################
# ref: https://kubernetes.io/docs/tasks/run-application/horizontal-pod-autoscale/
autoscaling:
  enabled: false
  # -- Minimum number of pods
  minReplicas: 1
  # -- Maximum number of pods
  maxReplicas: 30
  # -- Target CPU utilization percentage
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

##########################################################
# KEDA autoscaling - keda-scaledobject.yaml
# Event-driven autoscaling (preferred over plain HPA for Viro workloads).
# Use cpu/memory triggers for steady workloads; use an external trigger
# (http via the KEDA HTTP add-on, kafka, prometheus, cron, ...) to enable
# scale-to-zero of idle tenant workloads (set minReplicaCount: 0).
# Do NOT enable both autoscaling.enabled and keda.enabled at once.
##########################################################
keda:
  # -- Enable a KEDA ScaledObject for this workload
  enabled: false
  # -- Kind of the scale target (Deployment or StatefulSet)
  scaleTargetKind: Deployment
  # -- Minimum replicas. Set 0 for scale-to-zero (requires an external trigger).
  minReplicaCount: 1
  # -- Maximum replicas
  maxReplicaCount: 5
  # -- Replicas while idle (scaled-to-zero); null to disable
  idleReplicaCount: null
  # -- How often (s) KEDA evaluates triggers
  pollingInterval: 30
  # -- Wait (s) after the last trigger before scaling down
  cooldownPeriod: 300
  # -- Annotations on the ScaledObject (e.g. autoscaling.keda.sh/paused)
  annotations: {}
  # -- Advanced scaling behaviour (HPA scaling policies, etc.)
  advanced: {}
  # -- Scaling triggers. Default: CPU utilization. Override per workload.
  triggers:
    - type: cpu
      metricType: Utilization
      metadata:
        value: "80"

##########################################################
# Service Monitor- servicemonitor.yaml
##########################################################
# -- If enabled, create service monitor of Prometheus-Operator
# ref: https://github.com/prometheus-operator/prometheus-operator/blob/main/Documentation/user-guides/getting-started.md#include-servicemonitors
serviceMonitor:
  # -- Enables Service Monitor
  enabled: false
  # -- Annotations to assign to the ServiceMonitor
  annotations: {}
  # -- List of endpoints of service which Prometheus scrapes
  endpoints:
  - path: /internal/metrics
    port: http
    interval: 1m
    scheme: http
    scrapeTimeout: 30s
    honorLabels: true

  # -- Propagate certain service labels to Prometheus.
  targetLabels: []

##########################################################
# Cron Job- cronjob.yaml
##########################################################
cronjob:
  enabled: false
  jobs:

##########################################################
# Secrets- secrets.yaml
##########################################################
# -- Creates a secret resource
# The value must be base64 encoded
secrets: {}
# admin: <base64-encoded>
# https://kubernetes.io/docs/tasks/configure-pod-container/pull-image-private-registry/
privateRegistry: {}
#  dockerconfigjson: <base64-encoded>


##########################################################
# External Secrets
##########################################################
externalSecret:
  enabled: false

  # Default SecretStore for all externalsecrets defines which SecretStore to use when fetching the secret data
  secretStore:
    name: example-secret-store
    # kind: ClusterSecretStore # Defaults to SecretStore if not specified
  # RefreshInterval is the amount of time before the values reading again from the SecretStore provider
  refreshInterval: "10s"
  files:

##########################################################
# PersistentVolumeClaim - pvc.yaml
##########################################################
persistence:
  # -- Enable creation of PVC
  enabled: false
  # -- Use existing PVC instead of creating one
  # existingClaim: my-existing-pvc
  # -- Name override for PVC (defaults to <fullname>-pvc)
  # name: custom-pvc-name
  # -- Storage class name
  storageClassName: standard-rwo
  # -- Access modes
  accessModes:
    - ReadWriteOnce
  # -- Storage size
  size: 10Gi
  # -- Annotations for PVC
  annotations: {}
  # -- Additional labels for PVC
  additionalLabels: {}
  # -- Bind to specific PV
  # volumeName: my-pv

##########################################################
# VPA- vpa.yaml
##########################################################
# ref: https://github.com/kubernetes/autoscaler/blob/master/vertical-pod-autoscaler/README.md
vpaRecommender:
  enabled: false

##########################################################
# volume claim parameters for StatefulSet
##########################################################
volumeClaimTemplates: []
# - name: data
#   accessModes: [ "ReadWriteOnce" ]
#   resources:
#     requests:
#       storage: 1Gi
#   volumeMode: Filesystem

persistentVolumeClaimRetentionPolicy:
  whenDeleted: Delete
  whenScaled: Delete

##########################################################
# Job
##########################################################
job:
  enabled: false


##########################################################
# Datadog Agent
##########################################################
datadogAgent:
  enabled: false
##########################################################
# Defaults added for Viro: disable optional integrations so the chart renders
# out-of-the-box. Enable + configure per workload as needed.
##########################################################
clusterSecretStore:
  enabled: false
frontendConfig:
  enabled: false
managedCertificate:
  enabled: false
