{{- if .Values.gateway.enabled -}}
{{- $fullName := include "common-chart.fullname" . -}}
{{- $svcPort := .Values.gateway.backendPort | default 80 -}}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ $fullName }}
  namespace: {{ template "common-chart.namespace" . }}
  labels:
    {{- include "common-chart.labels" . | nindent 4 }}
{{- if .Values.gateway.additionalLabels }}
{{ toYaml .Values.gateway.additionalLabels | indent 4 }}
{{- end }}
  {{- with .Values.gateway.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.gateway.parentRefs }}
  parentRefs:
    {{- toYaml .Values.gateway.parentRefs | nindent 4 }}
  {{- end }}
  {{- if .Values.gateway.hostnames }}
  hostnames:
    {{- toYaml .Values.gateway.hostnames | nindent 4 }}
  {{- end }}
  rules:
  {{- if .Values.gateway.rules }}
    {{- toYaml .Values.gateway.rules | nindent 4 }}
  {{- else }}
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: {{ $fullName }}
          port: {{ $svcPort }}
  {{- end }}
{{- end }}
