{{- if .Values.clusterSecretStore.enabled }}
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: {{ .Values.clusterSecretStore.secretStore.name }}
  labels:
    {{- include "common-chart.labels" . | nindent 4 }}
spec:
  provider:
    gcpsm:
      projectID: {{ .Values.clusterSecretStore.provider.projectId }}
{{- end }}
