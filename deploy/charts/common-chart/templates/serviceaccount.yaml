{{- /*
Render a ServiceAccount object only when the chart is asked to CREATE one
(serviceAccount.enabled AND serviceAccount.create). For tenant workloads the
ServiceAccount is created imperatively by the control plane (with API-token
auto-mount disabled), so the chart binds the pod to it by name but must NOT
render/own a colliding ServiceAccount that would re-enable token auto-mount.
*/ -}}
{{- if and .Values.serviceAccount.enabled .Values.serviceAccount.create }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ default (include "common-chart.name" .) .Values.serviceAccount.name }}
  namespace: {{ template "common-chart.namespace" . }}
  labels:
    {{- include "common-chart.labels" . | nindent 4 }}
    {{- with .Values.serviceAccount.additionalLabels }}
      {{- toYaml . | nindent 4 }}
    {{- end }}
  annotations:
    {{- with .Values.serviceAccount.annotations }}
      {{- toYaml . | nindent 4 }}
    {{- end }}
{{- end }}
