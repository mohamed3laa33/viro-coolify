{{- if .Values.rbac.enabled }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ default (include "common-chart.fullname" .) .Values.rbac.roleBindingName }}
  namespace: {{ template "common-chart.namespace" . }}
  labels:
    {{- include "common-chart.labels" . | nindent 4 }}
    {{- with .Values.rbac.additionalLabels }}
      {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- with .Values.rbac.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ default (include "common-chart.fullname" .) .Values.rbac.roleName }}
subjects:
  - kind: ServiceAccount
    name: {{ default (include "common-chart.fullname" .) .Values.serviceAccount.name }}
    namespace: {{ template "common-chart.namespace" . }}
{{- end }}
