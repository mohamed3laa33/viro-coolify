# Vortex — full control-plane deployment for Kubernetes, FULLY AUTOMATED.
# Point it at any plain/new cluster and run ONE command — no manual kubectl:
#
#   VORTEX_JWT_SECRET=$(openssl rand -hex 32) \
#   VORTEX_SECRET_ENCRYPTION_KEY=$(openssl rand -hex 32) \
#   VORTEX_PG_PASSWORD=$(openssl rand -hex 24) \
#   VORTEX_DATABASE_URL="postgres://vortex:${VORTEX_PG_PASSWORD}@vortex-postgres.vortex.svc.cluster.local:5432/vortex?sslmode=require" \
#   VORTEX_DO_TOKEN=dop_v1_xxx \
#     helmfile -f deploy/helmfile.yaml apply
#
# It installs (in dependency order via `needs`): Gateway API CRDs + Envoy Gateway,
# cert-manager, KEDA (+ the KEDA HTTP add-on for true HTTP scale-to-zero/wake),
# metrics-server, a lightweight observability stack (Prometheus + Grafana + Loki +
# promtail) and Velero for backups, then the vortex-bootstrap chart (Postgres +
# shared Gateway + GatewayClass + DNS-01 issuer + wildcard TLS), then the Vortex
# control plane (api + web) wired to Postgres. Envoy Gateway's chart bundles the
# Gateway API CRDs, so there is nothing to apply by hand.
#
# CANONICAL NAMESPACE = "vortex". The control plane, the in-cluster Postgres and
# the shared Gateway all live here; the control-plane HTTPRoute's gatewayNamespace
# and deploy/k8s manifests, the CD workflow and deploy/scripts all agree on it.
# (Platform prerequisites keep their upstream conventional namespaces:
# cert-manager, envoy-gateway-system, keda, kube-system.) The Envoy data-plane
# namespace used by the NetworkPolicy is a separate concept (envoy-gateway-system).
#
# Config via env vars (see defaults below).
#
# -----------------------------------------------------------------------------
# Pod Security Admission (PSA) policy
# -----------------------------------------------------------------------------
# Tenant runtime is hardened in two layers:
#
#   1. Workload-level: the tenant common-chart (deploy/charts/common-chart) ships
#      a hardened default pod/container securityContext — runAsNonRoot, non-zero
#      UID/GID, allowPrivilegeEscalation=false, all capabilities dropped, and the
#      RuntimeDefault seccomp profile — i.e. the fields the PSA `restricted`
#      profile requires. (readOnlyRootFilesystem is opt-in per workload since
#      tenant images are arbitrary; it is not part of the `restricted` profile.)
#
#   2. Namespace-level: every TENANT namespace (one per org-project, created by
#      the control-plane API in kube.EnsureTenant — NOT declared here, because
#      they are provisioned dynamically at deploy time) MUST carry these labels
#      so the API server rejects any pod that escapes the chart defaults:
#
#        pod-security.kubernetes.io/enforce: restricted
#        pod-security.kubernetes.io/enforce-version: latest
#        pod-security.kubernetes.io/warn: restricted
#        pod-security.kubernetes.io/audit: restricted
#
#      Keep that label set in sync with the chart's securityContext defaults.
#
# Control-plane / platform-prerequisite namespaces (vortex, cert-manager,
# envoy-gateway-system, keda, kube-system) are intentionally NOT enforced as
# `restricted` here: the bootstrap Postgres and several upstream prerequisite
# charts (Envoy Gateway, metrics-server with --kubelet-insecure-tls, etc.) do
# not yet satisfy the full `restricted` profile, and forcing it would break the
# control plane. Those workloads are hardened individually in their own charts.
# Do NOT add `enforce: restricted` to the control-plane namespaces below until
# every control-plane pod (incl. bootstrap Postgres) sets seccompProfile.
# -----------------------------------------------------------------------------

repositories:
  - name: jetstack
    url: https://charts.jetstack.io
  - name: kedacore
    url: https://kedacore.github.io/charts
  - name: metrics-server
    url: https://kubernetes-sigs.github.io/metrics-server/
  # Maintained community chart from the kubernetes-sigs/external-dns project.
  - name: external-dns
    url: https://kubernetes-sigs.github.io/external-dns/
  - name: prometheus-community
    url: https://prometheus-community.github.io/helm-charts
  - name: grafana
    url: https://grafana.github.io/helm-charts
  - name: vmware-tanzu
    url: https://vmware-tanzu.github.io/helm-charts

environments:
  default:
    values:
      - registry: '{{ env "VORTEX_IMAGE_REGISTRY" | default "registry.digitalocean.com/vortex" }}'
        tag: '{{ env "VORTEX_IMAGE_TAG" | default "latest" }}'
        baseDomain: '{{ env "VORTEX_BASE_DOMAIN" | default "vortex.v60ai.com" }}'
        jwtSecret: '{{ requiredEnv "VORTEX_JWT_SECRET" }}'
        # App-secret encryption key. The API refuses to boot in production without it
        # (config.go), so source it via requiredEnv — a missing value fails loudly.
        secretEncryptionKey: '{{ requiredEnv "VORTEX_SECRET_ENCRYPTION_KEY" }}'
        # Postgres password and connection string are REQUIRED — no insecure default.
        # Supply a strong password (e.g. `openssl rand -hex 24`); the database URL must
        # use sslmode=require. Example:
        #   VORTEX_PG_PASSWORD=$(openssl rand -hex 24)
        #   VORTEX_DATABASE_URL="postgres://vortex:${VORTEX_PG_PASSWORD}@vortex-postgres.vortex.svc.cluster.local:5432/vortex?sslmode=require"
        pgPassword: '{{ requiredEnv "VORTEX_PG_PASSWORD" }}'
        databaseUrl: '{{ requiredEnv "VORTEX_DATABASE_URL" }}'
        adminEmails: '{{ env "VORTEX_ADMIN_EMAILS" | default "" }}'
        stripeSecretKey: '{{ env "VORTEX_STRIPE_SECRET_KEY" | default "" }}'
        stripeWebhookSecret: '{{ env "VORTEX_STRIPE_WEBHOOK_SECRET" | default "" }}'
        # DNS-01 token for the wildcard cert. REQUIRED — defaulting empty silently
        # skips TLS issuance, so source it via requiredEnv to fail loudly instead.
        doToken: '{{ requiredEnv "VORTEX_DO_TOKEN" }}'
        # Velero backups. The release is INSTALLED ONLY when a backup bucket is
        # configured — installing Velero without a BackupStorageLocation would be a
        # backup tool that silently backs up nowhere (a fake-success path,
        # invariant #6). Supply the S3-compatible bucket/endpoint and a
        # `velero-cloud-credentials` Secret (key `cloud`, AWS-style INI) to enable.
        veleroBucket: '{{ env "VORTEX_VELERO_BUCKET" | default "" }}'
        veleroRegion: '{{ env "VORTEX_VELERO_REGION" | default "" }}'
        veleroS3Url: '{{ env "VORTEX_VELERO_S3_URL" | default "" }}'
        # external-dns: automated DNS for platform-owned zones. Gated by
        # VORTEX_EXTERNAL_DNS_ENABLED — when false the release is NOT installed and
        # DNS stays fully manual (no fake-success path, invariant #6). The zone list
        # mirrors the control plane's kube.Config.ExternalDNSZones (both fed from
        # VORTEX_EXTERNAL_DNS_ZONES) so they cannot drift; defaults to the base domain
        # so the wildcard tenant domain is always covered when enabled.
        externalDnsEnabled: '{{ env "VORTEX_EXTERNAL_DNS_ENABLED" | default "false" }}'
        externalDnsZones: '{{ env "VORTEX_EXTERNAL_DNS_ZONES" | default (env "VORTEX_BASE_DOMAIN" | default "vortex.v60ai.com") }}'

---

releases:
  # ---- Platform prerequisites (all current, non-deprecated) ----
  # Label `tier: platform` marks everything the CD workflow stands up before it
  # upgrades the control-plane chart (see .github/workflows/deploy.yml). The
  # control-plane release below is labelled `tier: controlplane` and is excluded
  # there so CD can drive its image tag / pull-secret explicitly.
  - name: cert-manager
    namespace: cert-manager
    chart: jetstack/cert-manager
    version: v1.16.3
    labels:
      tier: platform
    set:
      - name: crds.enabled
        value: true

  - name: envoy-gateway
    namespace: envoy-gateway-system
    chart: oci://docker.io/envoyproxy/gateway-helm
    version: v1.2.4
    labels:
      tier: platform

  - name: keda
    namespace: keda
    chart: kedacore/keda
    version: 2.16.0
    labels:
      tier: platform

  # KEDA HTTP add-on — makes HTTP scale-to-zero actually WAKE on a request.
  # The core `keda` release only ships CPU/memory scalers, so a ScaledObject's
  # `http` trigger (rendered by the control plane's buildKeda when an app opts into
  # HTTP scaling — apps/api/internal/kube/kube.go) is inert: nothing routes the
  # inbound request through KEDA to scale a 0-replica workload back up. This add-on
  # supplies the interceptor proxy (buffers the request during the 0->1 wake) and
  # the external scaler, and owns the HTTPScaledObject CRD the control plane renders
  # per app. Installed into the shared `keda` namespace; needs the core operator.
  - name: keda-http-add-on
    namespace: keda
    chart: kedacore/keda-add-ons-http
    version: 0.10.0
    needs:
      - keda/keda
    values:
      - ./helm-values/keda-http-add-on.yaml

  - name: metrics-server
    namespace: kube-system
    chart: metrics-server/metrics-server
    labels:
      tier: platform
    values:
      - args:
          - --kubelet-insecure-tls

  # ---- Observability: lightweight metrics + logs retention ----
  # Prometheus + Grafana (+ the Prometheus Operator so the tenant common-chart's
  # ServiceMonitors are picked up) for metrics; Loki + promtail for logs. We stand
  # up the stack here with overcommit-friendly resources; the OBSERVABILITY AGENT
  # owns dashboards, datasource wiring and alert rules (not authored here).
  - name: kube-prometheus-stack
    namespace: monitoring
    createNamespace: true
    chart: prometheus-community/kube-prometheus-stack
    version: 67.5.0
    values:
      - ./helm-values/kube-prometheus-stack.yaml

  - name: loki
    namespace: monitoring
    createNamespace: true
    chart: grafana/loki
    version: 6.24.0
    needs:
      - monitoring/kube-prometheus-stack
    values:
      - ./helm-values/loki.yaml

  - name: promtail
    namespace: monitoring
    createNamespace: true
    chart: grafana/promtail
    version: 6.16.6
    needs:
      - monitoring/loki
    values:
      - ./helm-values/promtail.yaml

  # ---- Backups: Velero (only when an object-store bucket is configured) ----
  # installed: gated on VORTEX_VELERO_BUCKET so we never ship a backup tool that has
  # nowhere to back up to (fake-success, invariant #6). The bucket/region/endpoint
  # and a `velero-cloud-credentials` Secret must be provided to enable it.
  - name: velero
    namespace: velero
    createNamespace: true
    chart: vmware-tanzu/velero
    version: 8.2.0
    installed: '{{ if .Values.veleroBucket }}true{{ else }}false{{ end }}'
    values:
      - ./helm-values/velero.yaml
      # Bucket/region/endpoint are env-driven, so they are injected here (this inline
      # block IS templated by helmfile, unlike the static .yaml values file above).
      - configuration:
          backupStorageLocation:
            - name: default
              provider: aws
              bucket: '{{ .Values.veleroBucket }}'
              default: true
              config:
                region: '{{ .Values.veleroRegion }}'
                s3Url: '{{ .Values.veleroS3Url }}'
                s3ForcePathStyle: "true"
          volumeSnapshotLocation:
            - name: default
              provider: aws
              config:
                region: '{{ .Values.veleroRegion }}'

  # ---- Cluster bootstrap: Postgres + shared Gateway + DNS-01 issuer + wildcard TLS ----
  - name: vortex-bootstrap
    namespace: vortex
    createNamespace: true
    chart: ./charts/vortex-bootstrap
    labels:
      tier: platform
    needs:
      - cert-manager/cert-manager
      - envoy-gateway-system/envoy-gateway
    values:
      - baseDomain: '{{ .Values.baseDomain }}'
        postgres:
          password: '{{ .Values.pgPassword }}'
        tls:
          digitalOceanToken: '{{ .Values.doToken }}'

  # ---- Automated DNS for platform-owned zones (Gateway API + Service sources) ----
  # Maintained kubernetes-sigs/external-dns chart. Ordered AFTER envoy-gateway /
  # cert-manager AND vortex-bootstrap so the Gateway API CRDs exist and the shared
  # Gateway has a LoadBalancer address to publish records against. Gated by
  # VORTEX_EXTERNAL_DNS_ENABLED — when false the release is NOT installed and DNS
  # stays fully manual (no fake-success path, invariant #6). domainFilters /
  # txtOwnerId come from env so they mirror the control plane's kube.Config
  # (record TTL is set per-route by the API via DNSRecordTTL, not here). The
  # `external-dns-do` Secret (key `token`) is created by deploy/install.sh from
  # VORTEX_EXTERNAL_DNS_DO_TOKEN (defaulting to VORTEX_DO_TOKEN).
  - name: external-dns
    namespace: external-dns
    createNamespace: true
    chart: external-dns/external-dns
    version: 1.15.0
    labels:
      tier: platform
    installed: '{{ eq .Values.externalDnsEnabled "true" }}'
    needs:
      - cert-manager/cert-manager
      - envoy-gateway-system/envoy-gateway
      - vortex/vortex-bootstrap
    values:
      - ./helm-values/external-dns.yaml
      # Zones + ownership id come from env so they mirror the API's kube.Config
      # (ExternalDNSZones). The record target is derived from the shared Gateway's
      # status.addresses by the gateway-httproute source — no manual target needed.
      - txtOwnerId: '{{ .Values.baseDomain }}'
        domainFilters: '{{ .Values.externalDnsZones | splitList "," | toJson }}'
        env:
          - name: DO_TOKEN
            valueFrom:
              secretKeyRef:
                name: external-dns-do
                key: token

  # ---- Vortex control plane (api + web) wired to Postgres ----
  - name: vortex
    namespace: vortex
    createNamespace: true
    chart: ./helm/viro
    labels:
      tier: controlplane
    needs:
      - vortex/vortex-bootstrap
    values:
      - image:
          registry: '{{ .Values.registry }}'
          tag: '{{ .Values.tag }}'
        api:
          env:
            VORTEX_ENV: production
            VORTEX_HTTP_ADDR: ":8080"
            VORTEX_ADMIN_EMAILS: '{{ .Values.adminEmails }}'
            VORTEX_BILLING_ENABLED: '{{ if .Values.stripeSecretKey }}true{{ else }}false{{ end }}'
            # Mirror the external-dns release gate so the control plane stamps the
            # external-dns annotations on tenant Gateways/HTTPRoutes for the same
            # zones the external-dns controller is allowed to write (kube.Config).
            VORTEX_EXTERNAL_DNS_ENABLED: '{{ .Values.externalDnsEnabled }}'
            VORTEX_EXTERNAL_DNS_ZONES: '{{ .Values.externalDnsZones }}'
        web_public_api_url: 'https://api.{{ .Values.baseDomain }}'
        ingress:
          enabled: true
          gatewayName: vortex
          gatewayNamespace: vortex
          apiHost: 'api.{{ .Values.baseDomain }}'
          webHost: 'app.{{ .Values.baseDomain }}'
        secrets:
          jwtSecret: '{{ .Values.jwtSecret }}'
          secretEncryptionKey: '{{ .Values.secretEncryptionKey }}'
          databaseUrl: '{{ .Values.databaseUrl }}'
          stripeSecretKey: '{{ .Values.stripeSecretKey }}'
          stripeWebhookSecret: '{{ .Values.stripeWebhookSecret }}'
