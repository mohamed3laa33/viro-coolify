# Vortex — full control-plane deployment for Kubernetes, FULLY AUTOMATED.
# Point it at any plain/new cluster and run ONE command — no manual kubectl:
#
#   VORTEX_JWT_SECRET=$(openssl rand -hex 32) \
#   VORTEX_SECRET_ENCRYPTION_KEY=$(openssl rand -hex 32) \
#   VORTEX_PG_PASSWORD=$(openssl rand -hex 24) \
#   VORTEX_DATABASE_URL="postgres://vortex:${VORTEX_PG_PASSWORD}@vortex-postgres.vortex.svc.cluster.local:5432/vortex?sslmode=require" \
#   VORTEX_DO_TOKEN=dop_v1_xxx \
#     helmfile -f deploy/helmfile.yaml apply
#
# It installs (in dependency order via `needs`): Gateway API CRDs + Envoy Gateway,
# cert-manager, KEDA, metrics-server, then the vortex-bootstrap chart (Postgres +
# shared Gateway + GatewayClass + DNS-01 issuer + wildcard TLS), then the Vortex
# control plane (api + web) wired to Postgres. Envoy Gateway's chart bundles the
# Gateway API CRDs, so there is nothing to apply by hand.
#
# CANONICAL NAMESPACE = "vortex". The control plane, the in-cluster Postgres and
# the shared Gateway all live here; the control-plane HTTPRoute's gatewayNamespace
# and deploy/k8s manifests, the CD workflow and deploy/scripts all agree on it.
# (Platform prerequisites keep their upstream conventional namespaces:
# cert-manager, envoy-gateway-system, keda, kube-system.) The Envoy data-plane
# namespace used by the NetworkPolicy is a separate concept (envoy-gateway-system).
#
# Config via env vars (see defaults below).
#
# -----------------------------------------------------------------------------
# Pod Security Admission (PSA) policy
# -----------------------------------------------------------------------------
# Tenant runtime is hardened in two layers:
#
#   1. Workload-level: the tenant common-chart (deploy/charts/common-chart) ships
#      a hardened default pod/container securityContext — runAsNonRoot, non-zero
#      UID/GID, allowPrivilegeEscalation=false, all capabilities dropped, and the
#      RuntimeDefault seccomp profile — i.e. the fields the PSA `restricted`
#      profile requires. (readOnlyRootFilesystem is opt-in per workload since
#      tenant images are arbitrary; it is not part of the `restricted` profile.)
#
#   2. Namespace-level: every TENANT namespace (one per org-project, created by
#      the control-plane API in kube.EnsureTenant — NOT declared here, because
#      they are provisioned dynamically at deploy time) MUST carry these labels
#      so the API server rejects any pod that escapes the chart defaults:
#
#        pod-security.kubernetes.io/enforce: restricted
#        pod-security.kubernetes.io/enforce-version: latest
#        pod-security.kubernetes.io/warn: restricted
#        pod-security.kubernetes.io/audit: restricted
#
#      Keep that label set in sync with the chart's securityContext defaults.
#
# Control-plane / platform-prerequisite namespaces (vortex, cert-manager,
# envoy-gateway-system, keda, kube-system) are intentionally NOT enforced as
# `restricted` here: the bootstrap Postgres and several upstream prerequisite
# charts (Envoy Gateway, metrics-server with --kubelet-insecure-tls, etc.) do
# not yet satisfy the full `restricted` profile, and forcing it would break the
# control plane. Those workloads are hardened individually in their own charts.
# Do NOT add `enforce: restricted` to the control-plane namespaces below until
# every control-plane pod (incl. bootstrap Postgres) sets seccompProfile.
# -----------------------------------------------------------------------------

repositories:
  - name: jetstack
    url: https://charts.jetstack.io
  - name: kedacore
    url: https://kedacore.github.io/charts
  - name: metrics-server
    url: https://kubernetes-sigs.github.io/metrics-server/

environments:
  default:
    values:
      - registry: '{{ env "VORTEX_IMAGE_REGISTRY" | default "registry.digitalocean.com/vortex" }}'
        tag: '{{ env "VORTEX_IMAGE_TAG" | default "latest" }}'
        baseDomain: '{{ env "VORTEX_BASE_DOMAIN" | default "vortex.v60ai.com" }}'
        jwtSecret: '{{ requiredEnv "VORTEX_JWT_SECRET" }}'
        # App-secret encryption key. The API refuses to boot in production without it
        # (config.go), so source it via requiredEnv — a missing value fails loudly.
        secretEncryptionKey: '{{ requiredEnv "VORTEX_SECRET_ENCRYPTION_KEY" }}'
        # Postgres password and connection string are REQUIRED — no insecure default.
        # Supply a strong password (e.g. `openssl rand -hex 24`); the database URL must
        # use sslmode=require. Example:
        #   VORTEX_PG_PASSWORD=$(openssl rand -hex 24)
        #   VORTEX_DATABASE_URL="postgres://vortex:${VORTEX_PG_PASSWORD}@vortex-postgres.vortex.svc.cluster.local:5432/vortex?sslmode=require"
        pgPassword: '{{ requiredEnv "VORTEX_PG_PASSWORD" }}'
        databaseUrl: '{{ requiredEnv "VORTEX_DATABASE_URL" }}'
        adminEmails: '{{ env "VORTEX_ADMIN_EMAILS" | default "" }}'
        stripeSecretKey: '{{ env "VORTEX_STRIPE_SECRET_KEY" | default "" }}'
        stripeWebhookSecret: '{{ env "VORTEX_STRIPE_WEBHOOK_SECRET" | default "" }}'
        # DNS-01 token for the wildcard cert. REQUIRED — defaulting empty silently
        # skips TLS issuance, so source it via requiredEnv to fail loudly instead.
        doToken: '{{ requiredEnv "VORTEX_DO_TOKEN" }}'

---

releases:
  # ---- Platform prerequisites (all current, non-deprecated) ----
  # Label `tier: platform` marks everything the CD workflow stands up before it
  # upgrades the control-plane chart (see .github/workflows/deploy.yml). The
  # control-plane release below is labelled `tier: controlplane` and is excluded
  # there so CD can drive its image tag / pull-secret explicitly.
  - name: cert-manager
    namespace: cert-manager
    chart: jetstack/cert-manager
    version: v1.16.3
    labels:
      tier: platform
    set:
      - name: crds.enabled
        value: true

  - name: envoy-gateway
    namespace: envoy-gateway-system
    chart: oci://docker.io/envoyproxy/gateway-helm
    version: v1.2.4
    labels:
      tier: platform

  - name: keda
    namespace: keda
    chart: kedacore/keda
    version: 2.16.0
    labels:
      tier: platform

  - name: metrics-server
    namespace: kube-system
    chart: metrics-server/metrics-server
    labels:
      tier: platform
    values:
      - args:
          - --kubelet-insecure-tls

  # ---- Cluster bootstrap: Postgres + shared Gateway + DNS-01 issuer + wildcard TLS ----
  - name: vortex-bootstrap
    namespace: vortex
    createNamespace: true
    chart: ./charts/vortex-bootstrap
    labels:
      tier: platform
    needs:
      - cert-manager/cert-manager
      - envoy-gateway-system/envoy-gateway
    values:
      - baseDomain: '{{ .Values.baseDomain }}'
        postgres:
          password: '{{ .Values.pgPassword }}'
        tls:
          digitalOceanToken: '{{ .Values.doToken }}'

  # ---- Vortex control plane (api + web) wired to Postgres ----
  - name: vortex
    namespace: vortex
    createNamespace: true
    chart: ./helm/viro
    labels:
      tier: controlplane
    needs:
      - vortex/vortex-bootstrap
    values:
      - image:
          registry: '{{ .Values.registry }}'
          tag: '{{ .Values.tag }}'
        api:
          env:
            VORTEX_ENV: production
            VORTEX_HTTP_ADDR: ":8080"
            VORTEX_ADMIN_EMAILS: '{{ .Values.adminEmails }}'
            VORTEX_BILLING_ENABLED: '{{ if .Values.stripeSecretKey }}true{{ else }}false{{ end }}'
        web_public_api_url: 'https://api.{{ .Values.baseDomain }}'
        ingress:
          enabled: true
          gatewayName: vortex
          gatewayNamespace: vortex
          apiHost: 'api.{{ .Values.baseDomain }}'
          webHost: 'app.{{ .Values.baseDomain }}'
        secrets:
          jwtSecret: '{{ .Values.jwtSecret }}'
          secretEncryptionKey: '{{ .Values.secretEncryptionKey }}'
          databaseUrl: '{{ .Values.databaseUrl }}'
          stripeSecretKey: '{{ .Values.stripeSecretKey }}'
          stripeWebhookSecret: '{{ .Values.stripeWebhookSecret }}'
