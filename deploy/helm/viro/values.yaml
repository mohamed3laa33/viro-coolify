# Default values for the Viro Helm chart (DigitalOcean Kubernetes / DOKS).

nameOverride: ""
fullnameOverride: ""

image:
  # Container registry that hosts the vortex-api / vortex-web images. This is a
  # platform value, not a personal account: override it per-environment with
  # --set image.registry=... (the helmfile sources VORTEX_IMAGE_REGISTRY and the
  # CD workflow sets ghcr.io/<repo-owner>). Default is the DigitalOcean Container
  # Registry path used by deploy/scripts/02-build-and-push.sh.
  registry: registry.digitalocean.com/vortex
  pullPolicy: IfNotPresent
  tag: "latest"
  # Name of a pre-created docker-registry Secret granting pull access to GHCR.
  # Leave empty if the packages are public; the deploy workflow creates one
  # named "ghcr-pull" when a token is available.
  pullSecret: ""

api:
  name: api
  replicas: 2
  port: 8080
  image: vortex-api
  env:
    VORTEX_ENV: production
    VORTEX_HTTP_ADDR: ":8080"
    VORTEX_BILLING_ENABLED: "false"
  resources:
    requests: { cpu: 50m, memory: 64Mi }
    limits: { cpu: 500m, memory: 256Mi }
  # Hardened defaults. The API image is distroless "nonroot" (uid/gid 65532) and
  # needs no writable rootfs. Override per-environment if required.
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 65532
    runAsGroup: 65532
    fsGroup: 65532
    seccompProfile:
      type: RuntimeDefault
  securityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    runAsNonRoot: true
    capabilities:
      drop: ["ALL"]
    seccompProfile:
      type: RuntimeDefault

web:
  name: web
  replicas: 2
  port: 3000
  image: vortex-web
  env:
    NODE_ENV: production
  resources:
    requests: { cpu: 50m, memory: 128Mi }
    limits: { cpu: 500m, memory: 512Mi }
  # Hardened defaults. The web image (Next.js standalone) runs as uid/gid 1001 and
  # needs a writable /tmp; the chart mounts an emptyDir there when readOnlyRootFilesystem
  # is true. Override per-environment if required.
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 1001
    runAsGroup: 1001
    fsGroup: 1001
    seccompProfile:
      type: RuntimeDefault
  securityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    runAsNonRoot: true
    capabilities:
      drop: ["ALL"]
    seccompProfile:
      type: RuntimeDefault

# Dedicated ServiceAccount for the control plane. Token automounting is disabled by
# default (Docker-runtime mode, where neither pod talks to the Kubernetes API). When
# rbac.enabled is true the api pod runs the K8s kube.Backend and DOES need its token
# — see rbac below and api.yaml, which mounts the token only in that mode.
serviceAccount:
  create: true
  name: ""                  # defaults to the release fullname when empty
  annotations: {}

# Control-plane RBAC. Enable when the control plane runs the Kubernetes runtime
# (kube.Backend / ingress.enabled): it then provisions namespaces, installs tenant
# workloads via Helm, and manages Gateways/HTTPRoutes, KEDA ScaledObjects +
# HTTPScaledObjects, and cert-manager Certificates across tenant namespaces. The
# template binds a ClusterRole to the control-plane ServiceAccount; when enabled the
# api pod also gets its ServiceAccount token mounted. Leave false for the
# Docker-runtime control plane, which never reaches the API server.
rbac:
  enabled: true

# Control-plane network isolation. Default-deny ingress plus an explicit allow for
# the Gateway/proxy namespace to reach the web/api ports. Tenant namespaces are NOT
# allowed in — they must never reach the control-plane Postgres or services.
networkPolicy:
  enabled: true
  # Namespace running the Gateway data plane (Envoy proxy pods) that fronts the
  # control plane. Allowed to reach the web/api container ports.
  gatewayNamespace: envoy-gateway-system

# Secrets are read from a Kubernetes Secret (created by the chart from these values,
# or reference an existing one with existingSecret). NEVER commit real values —
# pass them via --set or a values file kept out of git.
secrets:
  existingSecret: ""        # if set, use this Secret instead of creating one
  jwtSecret: "change-me-in-production"
  # App-secret encryption key. The API hard-requires this in production (it refuses
  # to boot without it, see config.go); a missing key would otherwise silently fall
  # back to plaintext storage. Supply a strong value (e.g. `openssl rand -hex 32`).
  secretEncryptionKey: "change-me-in-production"
  # No insecure default: a real connection string MUST be supplied (via the helmfile's
  # required VORTEX_DATABASE_URL, --set, or an out-of-git values file). Use sslmode=require.
  databaseUrl: ""
  coolifyBaseUrl: ""
  coolifyToken: ""
  stripeSecretKey: ""
  stripeWebhookSecret: ""

# Public URLs.
web_public_api_url: "https://api.viro.example.com"

# Control-plane routing. The control plane normally runs on Docker; when run on
# K8s it routes via the Gateway API (NOT the retired ingress-nginx), attaching to
# the shared Vortex Gateway — one LB for everything.
#
# CANONICAL NAMESPACE: the control plane, the in-cluster Postgres and the shared
# Gateway all live in the "vortex" namespace (see deploy/helmfile.yaml). The
# gatewayNamespace below MUST match where the shared Gateway is installed (the
# vortex-bootstrap chart deploys it into its release namespace, "vortex"). Do NOT
# confuse this with networkPolicy.gatewayNamespace above, which is the Envoy
# data-plane namespace (envoy-gateway-system).
ingress:
  enabled: false
  gatewayName: vortex
  gatewayNamespace: vortex
  apiHost: api.vortex.v60ai.com
  webHost: app.vortex.v60ai.com

# In-cluster Postgres is optional; production should use DigitalOcean Managed Postgres.
postgres:
  enabled: false
