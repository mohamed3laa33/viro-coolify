# Default values for the Viro Helm chart (DigitalOcean Kubernetes / DOKS).

nameOverride: ""
fullnameOverride: ""

image:
  # Set registry to your DigitalOcean Container Registry, e.g. registry.digitalocean.com/viro
  registry: registry.digitalocean.com/viro
  pullPolicy: IfNotPresent
  tag: "0.1.0"

api:
  name: api
  replicas: 2
  port: 8080
  image: viro-api
  env:
    VIRO_ENV: production
    VIRO_HTTP_ADDR: ":8080"
    VIRO_BILLING_ENABLED: "false"
  resources:
    requests: { cpu: 50m, memory: 64Mi }
    limits: { cpu: 500m, memory: 256Mi }

web:
  name: web
  replicas: 2
  port: 3000
  image: viro-web
  env:
    NODE_ENV: production
  resources:
    requests: { cpu: 50m, memory: 128Mi }
    limits: { cpu: 500m, memory: 512Mi }

# Secrets are read from a Kubernetes Secret (created by the chart from these values,
# or reference an existing one with existingSecret). NEVER commit real values —
# pass them via --set or a values file kept out of git.
secrets:
  existingSecret: ""        # if set, use this Secret instead of creating one
  jwtSecret: "change-me-in-production"
  databaseUrl: "postgres://viro:viro@viro-postgres:5432/viro?sslmode=require"
  coolifyBaseUrl: ""
  coolifyToken: ""
  stripeSecretKey: ""
  stripeWebhookSecret: ""

# Public URLs.
web_public_api_url: "https://api.viro.example.com"

ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
  apiHost: api.viro.example.com
  webHost: app.viro.example.com
  tls: true

# In-cluster Postgres is optional; production should use DigitalOcean Managed Postgres.
postgres:
  enabled: false
