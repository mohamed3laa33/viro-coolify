{{- if .Values.serviceAccount.create }}
# Dedicated ServiceAccount for the Vortex control plane (api + web). Neither pod
# talks to the Kubernetes API, so token automounting is disabled here and on the
# pod specs — no API credentials are mounted into the containers.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "viro.serviceAccountName" . }}
  labels:
    {{- include "viro.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
automountServiceAccountToken: false
{{- end }}
