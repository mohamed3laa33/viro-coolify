{{- if .Values.serviceAccount.create }}
# Dedicated ServiceAccount for the Vortex control plane (api + web).
#
# Default (Docker runtime): neither pod talks to the Kubernetes API, so token
# automounting is OFF here and on both pod specs — no API credentials in the
# containers. K8s runtime (rbac.enabled): the api pod runs kube.Backend and needs
# its token, so it overrides the mount to true at the pod level (api.yaml) while the
# web pod keeps it off. The SA-level default follows rbac.enabled for consistency.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "viro.serviceAccountName" . }}
  labels:
    {{- include "viro.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
automountServiceAccountToken: {{ .Values.rbac.enabled }}
{{- end }}
