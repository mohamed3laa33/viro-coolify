apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "viro.fullname" . }}-web
  labels:
    {{- include "viro.labels" . | nindent 4 }}
    app.kubernetes.io/component: web
spec:
  replicas: {{ .Values.web.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: web
  template:
    metadata:
      labels:
        {{- include "viro.labels" . | nindent 8 }}
        app.kubernetes.io/component: web
    spec:
      {{- if .Values.image.pullSecret }}
      imagePullSecrets:
        - name: {{ .Values.image.pullSecret }}
      {{- end }}
      serviceAccountName: {{ include "viro.serviceAccountName" . }}
      automountServiceAccountToken: false
      {{- with .Values.web.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: web
          image: "{{ .Values.image.registry }}/{{ .Values.web.image }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- with .Values.web.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - containerPort: {{ .Values.web.port }}
          env:
            {{- range $k, $v := .Values.web.env }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
            - name: NEXT_PUBLIC_VORTEX_API_URL
              value: {{ .Values.web_public_api_url | quote }}
          readinessProbe:
            httpGet: { path: /, port: {{ .Values.web.port }} }
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.web.resources | nindent 12 }}
          {{- if and .Values.web.securityContext .Values.web.securityContext.readOnlyRootFilesystem }}
          # Next.js standalone writes runtime files (cache, etc.) under /tmp; provide
          # an in-memory writable mount so the rootfs can stay read-only.
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          {{- end }}
      {{- if and .Values.web.securityContext .Values.web.securityContext.readOnlyRootFilesystem }}
      volumes:
        - name: tmp
          emptyDir: {}
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "viro.fullname" . }}-web
  labels:
    {{- include "viro.labels" . | nindent 4 }}
    app.kubernetes.io/component: web
spec:
  selector:
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: web
  ports:
    - port: 80
      targetPort: {{ .Values.web.port }}
