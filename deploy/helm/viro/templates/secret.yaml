{{- if not .Values.secrets.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "viro.secretName" . }}
  labels:
    {{- include "viro.labels" . | nindent 4 }}
type: Opaque
stringData:
  VORTEX_JWT_SECRET: {{ .Values.secrets.jwtSecret | quote }}
  VORTEX_SECRET_ENCRYPTION_KEY: {{ .Values.secrets.secretEncryptionKey | quote }}
  VORTEX_DATABASE_URL: {{ .Values.secrets.databaseUrl | quote }}
  VORTEX_COOLIFY_BASE_URL: {{ .Values.secrets.coolifyBaseUrl | quote }}
  VORTEX_COOLIFY_TOKEN: {{ .Values.secrets.coolifyToken | quote }}
  VORTEX_STRIPE_SECRET_KEY: {{ .Values.secrets.stripeSecretKey | quote }}
  VORTEX_STRIPE_WEBHOOK_SECRET: {{ .Values.secrets.stripeWebhookSecret | quote }}
{{- end }}
