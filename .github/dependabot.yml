version: 2
updates:
  - package-ecosystem: gomod
    directory: /apps/api
    schedule: { interval: weekly }
    open-pull-requests-limit: 10
    groups:
      go-deps:
        patterns: ["*"]

  - package-ecosystem: npm
    directory: /apps/web
    schedule: { interval: weekly }
    open-pull-requests-limit: 10
    groups:
      npm-deps:
        patterns: ["*"]
    # Major bumps of these need a deliberate migration (Tailwind v4 / Next 16 /
    # React 20 change build/config); don't auto-PR them and break the build.
    ignore:
      - dependency-name: next
        update-types: ["version-update:semver-major"]
      - dependency-name: tailwindcss
        update-types: ["version-update:semver-major"]
      - dependency-name: react
        update-types: ["version-update:semver-major"]
      - dependency-name: react-dom
        update-types: ["version-update:semver-major"]
      # eslint 10 has no compatible eslint-plugin-jsx-a11y / eslint-config-next
      # yet (peer dep tops out at eslint 9) — hold majors until the ecosystem
      # catches up, otherwise `npm ci` fails ERESOLVE.
      - dependency-name: eslint
        update-types: ["version-update:semver-major"]
      - dependency-name: eslint-config-next
        update-types: ["version-update:semver-major"]

  - package-ecosystem: github-actions
    directory: /
    schedule: { interval: weekly }

  - package-ecosystem: docker
    directory: /docker
    schedule: { interval: weekly }
