version: 2
updates:
  - package-ecosystem: gomod
    directory: /apps/api
    schedule: { interval: weekly }
    open-pull-requests-limit: 10
    groups:
      go-deps:
        patterns: ["*"]

  - package-ecosystem: npm
    directory: /apps/web
    schedule: { interval: weekly }
    open-pull-requests-limit: 10
    groups:
      npm-deps:
        patterns: ["*"]

  - package-ecosystem: github-actions
    directory: /
    schedule: { interval: weekly }

  - package-ecosystem: docker
    directory: /docker
    schedule: { interval: weekly }
