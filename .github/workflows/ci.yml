name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

jobs:
  api:
    name: API (Go)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache-dependency-path: apps/api/go.sum
      - name: Vet
        run: go vet ./...
      - name: Test (race + coverage)
        run: go test -race -count=1 -coverprofile=coverage.out ./...
      - name: Build
        run: go build ./...
      - name: Lint (golangci-lint v2 — gosec SAST, dupl, gocritic, staticcheck)
        run: |
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/HEAD/install.sh \
            | sh -s -- -b "$(go env GOPATH)/bin" v2.12.2
          golangci-lint run --timeout 5m ./...
      - name: Vulnerability & deprecation scan (govulncheck)
        run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...

  web:
    name: Web (Next.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - name: Install
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Typecheck
        run: npx tsc --noEmit
      - name: Format check (prettier)
        run: npm run format:check
      - name: Unit tests
        run: npm run test
      - name: Coverage (enforces vitest thresholds)
        run: npm run test:coverage
      - name: Build
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: "1"
          # api.ts requires the public API URL at build time; CI just needs a
          # non-empty value to compile (the artifact is not deployed).
          NEXT_PUBLIC_VORTEX_API_URL: "https://api.vortex.v60ai.com"
      - name: Guard — touch-target variant emits in built CSS
        # The `pointer-coarse:min-h-[2.75rem]` utility must survive into the
        # production CSS so 44px touch targets can't silently regress. The
        # minifier strips spaces in media queries, so match space-insensitively.
        run: |
          shopt -s globstar nullglob
          css=$(cat .next/static/css/**/*.css .next/static/css/*.css 2>/dev/null || true)
          if [ -z "$css" ]; then
            echo "::error::No built CSS found under .next/static/css — did the build emit styles?"
            exit 1
          fi
          stripped=$(printf '%s' "$css" | tr -d ' ')
          if ! printf '%s' "$stripped" | grep -q '@media(pointer:coarse)'; then
            echo "::error::Missing '@media (pointer: coarse)' rule in built CSS — pointer-coarse variant regressed."
            exit 1
          fi
          if ! printf '%s' "$stripped" | grep -q 'min-height:2.75rem'; then
            echo "::error::Missing 'min-height:2.75rem' (44px touch target) in built CSS — touch-target utility regressed."
            exit 1
          fi
          echo "OK: touch-target variant ('@media (pointer: coarse)' + 'min-height:2.75rem') present in built CSS."
      - name: Dependency audit (npm)
        run: npm audit --audit-level=high --omit=dev

  security:
    name: Security (Trivy)
    # Runs on push/PR. Mirrored locally by ./scripts/security-scan.sh.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install Trivy
        run: |
          mkdir -p "$RUNNER_TEMP/bin"
          curl -sSfL https://github.com/aquasecurity/trivy/releases/download/v0.71.1/trivy_0.71.1_Linux-64bit.tar.gz \
            | tar -xz -C "$RUNNER_TEMP/bin" trivy
          echo "$RUNNER_TEMP/bin" >> "$GITHUB_PATH"
          "$RUNNER_TEMP/bin/trivy" --version
      - name: Trivy — dependency & secret scan
        run: |
          trivy fs --scanners vuln,secret --severity HIGH,CRITICAL --ignore-unfixed \
            --exit-code 1 --no-progress --skip-dirs _ref-volo,_ref-viro-app,_clone .
      - name: Trivy — IaC/K8s misconfig scan
        run: |
          trivy config --severity HIGH,CRITICAL --exit-code 1 --quiet \
            --skip-dirs deploy/charts/common-chart,_ref-volo,_ref-viro-app,_clone .
      - name: Gitleaks — secret scan
        run: |
          mkdir -p "$RUNNER_TEMP/bin"
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz \
            | tar -xz -C "$RUNNER_TEMP/bin" gitleaks
          "$RUNNER_TEMP/bin/gitleaks" dir . --config .gitleaks.toml --no-banner --redact --exit-code 1

  sast:
    name: SAST (Semgrep)
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v7
      - name: Semgrep scan
        run: semgrep ci
        env:
          SEMGREP_RULES: "p/default p/security-audit p/secrets p/golang p/typescript"

  e2e:
    name: E2E (Playwright)
    # Real full-stack smoke: boots the API (in-memory store + FakeBackend, dev
    # secrets — no cluster/DB needed) and the Next.js production STANDALONE server
    # (the exact artifact docker/Dockerfile.web ships), seeds an account, then
    # drives the dashboard with Playwright. This gate catches what jsdom unit
    # tests and `next build` can't — e.g. the CSP/hydration regression.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache-dependency-path: apps/api/go.sum
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - name: Build API binary
        working-directory: apps/api
        run: go build -o "$RUNNER_TEMP/vortex-api" ./cmd/api
      - name: Install web deps + build standalone (pointed at the local API)
        working-directory: apps/web
        env:
          NEXT_TELEMETRY_DISABLED: "1"
          NEXT_PUBLIC_VORTEX_API_URL: "http://localhost:8080"
        run: |
          npm ci
          npm run build
          # The standalone server needs static assets + public/ copied alongside it.
          cp -r .next/static .next/standalone/.next/static
          cp -r public .next/standalone/public
      - name: Install Playwright browser
        working-directory: apps/web
        run: npx playwright install --with-deps chromium
      - name: Boot API + web, seed account, run E2E
        working-directory: apps/web
        env:
          E2E_BASE_URL: "http://localhost:3000"
          E2E_EMAIL: "e2e@vortex.test"
          E2E_PASSWORD: "E2ePassw0rd!23"
        run: |
          set -e
          # API: dev mode → in-memory store + FakeBackend + dev secrets, CORS for the web origin.
          VORTEX_ENV=development HTTP_ADDR=:8080 VORTEX_CORS_ORIGINS=http://localhost:3000 \
            "$RUNNER_TEMP/vortex-api" > "$RUNNER_TEMP/api.log" 2>&1 &
          for i in $(seq 1 30); do curl -sf localhost:8080/healthz >/dev/null && break; sleep 1; done
          curl -sf -X POST localhost:8080/v1/auth/signup -H 'content-type: application/json' \
            -d "{\"email\":\"$E2E_EMAIL\",\"name\":\"E2E\",\"password\":\"$E2E_PASSWORD\"}" >/dev/null
          # Web: the production standalone server (same as docker/Dockerfile.web).
          PORT=3000 node .next/standalone/server.js > "$RUNNER_TEMP/web.log" 2>&1 &
          for i in $(seq 1 30); do curl -sf localhost:3000/login >/dev/null && break; sleep 1; done
          npx playwright test
      - name: Dump server logs on failure
        if: failure()
        run: |
          echo "::group::API log"; cat "$RUNNER_TEMP/api.log" 2>/dev/null || true; echo "::endgroup::"
          echo "::group::Web log"; cat "$RUNNER_TEMP/web.log" 2>/dev/null || true; echo "::endgroup::"
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: apps/web/playwright-report
          if-no-files-found: ignore
          retention-days: 7

