name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  api:
    name: API (Go)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache-dependency-path: apps/api/go.sum
      - name: Vet
        run: go vet ./...
      - name: Test (race + coverage)
        run: go test -race -count=1 -coverprofile=coverage.out ./...
      - name: Build
        run: go build ./...
      - name: Lint (golangci-lint — gosec SAST, dupl, gocritic, staticcheck)
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2
          working-directory: apps/api
      - name: Vulnerability & deprecation scan (govulncheck)
        run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...

  web:
    name: Web (Next.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - name: Install
        run: npm ci
      - name: Unit tests
        run: npm run test
      - name: Build
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: "1"
      - name: Dependency audit (npm)
        run: npm audit --audit-level=high --omit=dev

  security:
    name: Security (Trivy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Trivy — dependency & secret scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scanners: vuln,secret
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"
          skip-dirs: _ref-volo,_ref-viro-app,_clone
      - name: Trivy — IaC/K8s misconfig scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: config
          severity: HIGH,CRITICAL
          exit-code: "1"
          skip-dirs: deploy/charts/common-chart
      - name: Gitleaks — secret scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  sast:
    name: SAST (Semgrep)
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v4
      - name: Semgrep scan
        run: semgrep ci
        env:
          SEMGREP_RULES: "p/default p/security-audit p/secrets p/golang p/typescript"

