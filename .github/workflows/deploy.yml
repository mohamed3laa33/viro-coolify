name: Deploy to DigitalOcean

# CD pipeline: deploys the Vortex API + web images (already built and pushed to
# the GitHub Container Registry by images.yml) to the DOKS cluster via Helm.
#
# Trigger: a version tag (v*) or a manual run. Requires these repo secrets:
#   DIGITALOCEAN_ACCESS_TOKEN    - DO API token (kubernetes access)
#   DO_CLUSTER_NAME              - DOKS cluster name (e.g. vortex)
#   VORTEX_JWT_SECRET            - production JWT signing secret
#   VORTEX_SECRET_ENCRYPTION_KEY - app-secret encryption key (API refuses to boot without it)
#   VORTEX_DATABASE_URL          - managed Postgres connection string
#   VORTEX_STRIPE_SECRET_KEY     - Stripe key (optional)
#   VORTEX_STRIPE_WEBHOOK_SECRET - Stripe webhook secret (optional)
#   GHCR_PULL_TOKEN              - (optional) PAT with read:packages for a durable
#                                  in-cluster pull secret. If the GHCR packages are
#                                  public, this is not needed.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag to deploy (defaults to the commit SHA)"
        required: false
        default: ""

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: read

env:
  REGISTRY: ghcr.io

jobs:
  deploy:
    name: Deploy to DOKS
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Resolve image tag
        id: tag
        env:
          INPUT_TAG: ${{ github.event.inputs.tag }}
          REF_TYPE: ${{ github.ref_type }}
        run: |
          if [ -n "$INPUT_TAG" ]; then
            echo "tag=$INPUT_TAG" >> "$GITHUB_OUTPUT"
          elif [ "$REF_TYPE" = "tag" ]; then
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=sha-$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          fi

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Configure kubectl for DOKS
        run: doctl kubernetes cluster kubeconfig save "${{ secrets.DO_CLUSTER_NAME }}"

      - name: Create / refresh GHCR pull secret
        env:
          GHCR_TOKEN: ${{ secrets.GHCR_PULL_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OWNER: ${{ github.repository_owner }}
        run: |
          kubectl create namespace viro --dry-run=client -o yaml | kubectl apply -f -
          TOKEN="${GHCR_TOKEN:-$GITHUB_TOKEN}"
          kubectl -n viro create secret docker-registry ghcr-pull \
            --docker-server="$REGISTRY" \
            --docker-username="$OWNER" \
            --docker-password="$TOKEN" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Helm deploy
        env:
          OWNER: ${{ github.repository_owner }}
        run: |
          helm upgrade --install vortex deploy/helm/viro \
            --namespace viro --create-namespace \
            --set image.registry="${REGISTRY}/${OWNER}" \
            --set image.tag="${{ steps.tag.outputs.tag }}" \
            --set image.pullSecret="ghcr-pull" \
            --set secrets.jwtSecret="${{ secrets.VORTEX_JWT_SECRET }}" \
            --set secrets.secretEncryptionKey="${{ secrets.VORTEX_SECRET_ENCRYPTION_KEY }}" \
            --set secrets.databaseUrl="${{ secrets.VORTEX_DATABASE_URL }}" \
            --set secrets.stripeSecretKey="${{ secrets.VORTEX_STRIPE_SECRET_KEY }}" \
            --set secrets.stripeWebhookSecret="${{ secrets.VORTEX_STRIPE_WEBHOOK_SECRET }}" \
            --wait --timeout 5m

      - name: Rollout status
        run: |
          kubectl -n viro rollout status deploy/vortex-viro-api --timeout=3m
          kubectl -n viro rollout status deploy/vortex-viro-web --timeout=3m
