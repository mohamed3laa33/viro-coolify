name: Deploy to DigitalOcean

# CD pipeline: builds the Viro API + web images, pushes them to DigitalOcean
# Container Registry, and rolls them out to the DOKS cluster via Helm.
#
# Trigger: a version tag (v*) or a manual run. Requires these repo secrets:
#   DIGITALOCEAN_ACCESS_TOKEN  - DO API token (registry + kubernetes access)
#   DO_CLUSTER_NAME            - DOKS cluster name (e.g. viro)
#   DOCR_NAME                  - container registry name (e.g. viro)
#   VIRO_JWT_SECRET            - production JWT signing secret
#   VIRO_DATABASE_URL          - managed Postgres connection string
#   VIRO_COOLIFY_BASE_URL      - Coolify instance URL (optional)
#   VIRO_COOLIFY_TOKEN         - Coolify API token (optional)
#   VIRO_STRIPE_SECRET_KEY     - Stripe key (optional)
#   VIRO_STRIPE_WEBHOOK_SECRET - Stripe webhook secret (optional)

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag to build and deploy"
        required: false
        default: ""

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Build, push & deploy
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Resolve image tag
        id: tag
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.ref_type }}" = "tag" ]; then
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          fi

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Log in to DOCR
        run: doctl registry login --expiry-seconds 1200

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.api
          push: true
          tags: registry.digitalocean.com/${{ secrets.DOCR_NAME }}/viro-api:${{ steps.tag.outputs.tag }}
          build-args: |
            VERSION=${{ steps.tag.outputs.tag }}
            COMMIT=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.web
          push: true
          tags: registry.digitalocean.com/${{ secrets.DOCR_NAME }}/viro-web:${{ steps.tag.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Configure kubectl for DOKS
        run: doctl kubernetes cluster kubeconfig save "${{ secrets.DO_CLUSTER_NAME }}"

      - name: Helm deploy
        run: |
          helm upgrade --install viro deploy/helm/viro \
            --namespace viro --create-namespace \
            --set image.registry=registry.digitalocean.com/${{ secrets.DOCR_NAME }} \
            --set image.tag=${{ steps.tag.outputs.tag }} \
            --set secrets.jwtSecret="${{ secrets.VIRO_JWT_SECRET }}" \
            --set secrets.databaseUrl="${{ secrets.VIRO_DATABASE_URL }}" \
            --set secrets.coolifyBaseUrl="${{ secrets.VIRO_COOLIFY_BASE_URL }}" \
            --set secrets.coolifyToken="${{ secrets.VIRO_COOLIFY_TOKEN }}" \
            --set secrets.stripeSecretKey="${{ secrets.VIRO_STRIPE_SECRET_KEY }}" \
            --set secrets.stripeWebhookSecret="${{ secrets.VIRO_STRIPE_WEBHOOK_SECRET }}" \
            --wait --timeout 5m

      - name: Rollout status
        run: |
          kubectl -n viro rollout status deploy/viro-viro-api --timeout=3m
          kubectl -n viro rollout status deploy/viro-viro-web --timeout=3m
