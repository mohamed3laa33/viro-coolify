# Local development dependencies for Viro.
# Brings up Postgres (control-plane data) and Redis (cache/queues).
# The Go API and Next.js web app run on the host during development.
#
#   docker compose -f docker/docker-compose.yml up -d
#
# A full-stack compose (API + web images) is added in Milestone 7.

name: viro-dev

services:
  postgres:
    image: postgres:16-alpine
    container_name: viro-postgres
    environment:
      POSTGRES_USER: viro
      POSTGRES_PASSWORD: viro
      POSTGRES_DB: viro
    ports:
      - "5432:5432"
    volumes:
      - viro_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U viro"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: viro-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - viro_redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  viro_pgdata:
  viro_redisdata:
